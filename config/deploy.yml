# Name of your application. Used to uniquely configure containers.
service: monitoresuagrana

# Name of the container image (use your-user/app-name on external registries).
image: guilpejon/monitoresuagrana

# Deploy to these servers.
servers:
  web:
    - ssh.monitoresuagrana.com.br

# Kamal proxy configuration
# Cloudflare tunnel handles SSL — no Let's Encrypt needed.
deploy_timeout: 90

proxy:
  ssl: false
  host: monitoresuagrana.com.br,www.monitoresuagrana.com.br
  healthcheck:
    path: /up
    interval: 3

# Where you keep your container images.
registry:
  server: docker.io
  username: guilpejon
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - MONITORESUAGRANA_DATABASE_PASSWORD
  clear:
    APP_HOST: monitoresuagrana.com.br,www.monitoresuagrana.com.br

    # Run the Solid Queue Supervisor inside the web server's Puma process.
    SOLID_QUEUE_IN_PUMA: true

    # Raspberry Pi has limited resources, keep concurrency low.
    WEB_CONCURRENCY: 0
    RAILS_MAX_THREADS: 5

    # Reuse tabsbase's PostgreSQL container (Option A — shared instance).
    DB_HOST: tabsbase-db

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for Active Storage files.
volumes:
  - "monitoresuagrana_storage:/rails/storage"
  - "monitoresuagrana_cache:/rails/tmp/cache"

asset_path: /rails/public/assets

# Configure the image builder.
builder:
  # Raspberry Pi uses ARM64 architecture.
  arch: arm64

  # Build directly on the Pi (native ARM64, much faster than QEMU emulation).
  remote: ssh://guilpejon@ssh.monitoresuagrana.com.br

# SSH configuration for Raspberry Pi.
ssh:
  user: guilpejon
